site_name: Edrak (إدراك) – Technical Documentation
site_description: "AI Second Brain — Your silent memory. It listens, organizes, and remembers so you don't have to."
docs_dir: content
site_dir: site

theme:
  name: material
  # logo: docs/assets/logo.png
  # favicon: docs/assets/favicon.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.tracking
    - navigation.path
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.suggest
    - search.share
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - navigation.indexes
  palette:
    # Light mode — Edrak Theme
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode — Edrak Stealth Theme
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

